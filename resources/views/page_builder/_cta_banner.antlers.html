{{#
    @name CTA Banner
    @desc A full-width call-to-action banner with pastel background.
    @set page.page_builder.cta_banner
#}}

<!-- /page_builder/_cta_banner.antlers.html -->
<section class="relative overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-[#3d1f4e] via-[#7b4591] to-[#9b62ad]"></div>
    <div class="absolute inset-0 pointer-events-none" aria-hidden="true">
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-white/5 rounded-full blur-3xl translate-x-1/3 translate-y-1/3"></div>
    </div>
    <div class="relative fluid-grid py-16 md:py-24">
        <div class="span-content flex flex-col items-center text-center">
            {{ if block:heading }}
                <h2 class="text-3xl md:text-4xl tracking-[-0.02em] text-white">{{ block:heading }}</h2>
            {{ /if }}
            {{ if block:text }}
                <p class="mt-4 text-white/70 max-w-xl text-lg leading-relaxed">{{ block:text }}</p>
            {{ /if }}
            <div class="mt-8">
                <button
                    type="button"
                    data-open-form-modal="booking"
                    class="inline-flex items-center gap-2 px-7 py-3.5 rounded-full bg-white text-neutral-800 font-semibold text-sm shadow-lg shadow-black/10 hover:bg-white/90 transition-all"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <span>{{ block:cta_label ?? 'Send an inquiry' }}</span>
                </button>
            </div>
        </div>
    </div>
</section>
<!-- End: /page_builder/_cta_banner.antlers.html -->
