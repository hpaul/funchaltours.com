title: 'Page builder'
fields:
  -
    handle: page_builder
    field:
      type: replicator
      localizable: true
      hide_display: true
      collapse: true
      listable: false
      display: 'Page builder'
      button_label: 'Add block'
      sets:
        sections:
          display: Sections
          instructions: 'Full-width page sections.'
          icon: layout-sidebar-left
          sets:
            hero:
              display: Hero
              instructions: 'Large hero section with heading, subheading, and call to action.'
              icon: hero-image-above-text
              fields:
                -
                  import: hero
            tour_cards:
              display: 'Tour Cards'
              instructions: 'Display tour collection entries as cards.'
              icon: navigation-arrows
              fields:
                -
                  import: tour_cards
            experience_split:
              display: 'Experience Split'
              instructions: 'Premium image + text split section to showcase a tour.'
              icon: hero-image-above-text
              fields:
                -
                  import: experience_split
            features_grid:
              display: 'Features Grid'
              instructions: 'Grid of feature cards with icons.'
              icon: navigation-arrows
              fields:
                -
                  import: features_grid
            discover_more:
              display: 'Discover More'
              instructions: 'Editorial section promoting custom/private tours with experience ideas.'
              icon: hero-image-above-text
              fields:
                -
                  import: discover_more
            cta_banner:
              display: 'CTA Banner'
              instructions: 'Full-width call-to-action banner.'
              icon: mail-chat-bubble-text
              fields:
                -
                  import: cta_banner
        image_and_text:
          display: 'Image and text'
          instructions: 'Image and text based blocks.'
          icon: hero-image-above-text
          sets:
            article:
              display: Article
              instructions: 'Long form content, can be expanded with media like figures, video, quotes or tables.'
              icon: text-formatting-image-bottom
              image: article.jpeg
              fields:
                -
                  import: article
        interactive:
          display: Interactive
          instructions: 'Interactive blocks.'
          icon: programming-script-code
          sets:
            form:
              display: Form
              instructions: 'Select and render a form.'
              icon: mail-chat-bubble-text
              image: form.jpeg
              fields:
                -
                  import: form
            cards:
              display: Cards
              instructions: 'Show linkable cards with text.'
              icon: link
              image: cards.jpeg
              fields:
                -
                  import: cards
